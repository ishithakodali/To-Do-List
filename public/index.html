<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart To-Do | Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Theme Toggle -->
    <div class="theme-toggle-wrapper">
        <button id="themeToggle" type="button" aria-label="Toggle Theme">
            <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            <span>Theme</span>
        </button>
    </div>

    <div class="auth-page-wrapper">
        <div class="auth-container">
            
            <div class="auth-header">
                <div class="auth-logo">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"></polyline><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>
                </div>
                <h1>To - Do List</h1>
                <p>Enter your details to access your tasks.</p>
            </div>

            <!-- Login Section -->
            <div id="login-section">
                <form id="login-form">
                    <div class="input-group">
                        <label for="login-username">Email or Username</label>
                        <input
                            type="text"
                            id="login-username"
                            placeholder="name@example.com"
                            required
                        >
                    </div>

                    <div class="input-group">
                        <label for="login-password">Password</label>
                        <input
                            type="password"
                            id="login-password"
                            placeholder="••••••••"
                            required
                        >
                    </div>

                    <button
                        type="submit"
                        id="login-btn"
                        class="btn-primary"
                    >
                        Sign in
                    </button>
                </form>

                <p id="login-error" class="error-msg"></p>

                <div class="auth-switch">
                    Don't have an account?
                    <a href="#" id="show-register">Sign up</a>
                </div>
            </div>

            <!-- Register Section -->
            <div id="register-section" style="display: none;">
                <form id="register-form">
                    <div class="input-group">
                        <label for="register-username">Username</label>
                        <input
                            type="text"
                            id="register-username"
                            placeholder="johndoe"
                            required
                        >
                    </div>

                    <div class="input-group">
                        <label for="register-email">Email</label>
                        <input
                            type="email"
                            id="register-email"
                            placeholder="name@example.com"
                            required
                        >
                    </div>

                    <div class="input-group">
                        <label for="register-password">Password</label>
                        <input
                            type="password"
                            id="register-password"
                            placeholder="••••••••"
                            required
                        >
                    </div>

                    <div class="input-group">
                        <label for="register-confirm">Confirm Password</label>
                        <input
                            type="password"
                            id="register-confirm"
                            placeholder="••••••••"
                            required
                        >
                    </div>

                    <button
                        type="submit"
                        id="register-btn"
                        class="btn-primary"
                    >
                        Create Account
                    </button>
                </form>

                <p id="register-error" class="error-msg"></p>

                <div class="auth-switch">
                    Already have an account?
                    <a href="#" id="show-login">Sign in</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Theme Script -->
    <script src="js/theme.js"></script>
    <!-- Auth Script -->
    <script src="js/auth.js"></script>

</body>
</html>
